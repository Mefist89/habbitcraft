<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6C63FF",
                        "secondary": "#FF6584",
                        "tertiary": "#4ECDC4",
                        "background-start": "#E0F2FE",
                        "background-end": "#FFFFFF",
                        "on-surface": "#2D3436",
                        "on-surface-variant": "#636E72",
                        "surface": "#FFFFFF",
                        "outline": "#E2E8F0"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "12px",
                        "lg": "16px",
                        "xl": "24px",
                        "2xl": "32px",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "soft": "0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05)",
                        "vibrant": "0 20px 25px -5px rgba(108, 99, 255, 0.3), 0 8px 10px -6px rgba(108, 99, 255, 0.3)",
                        "floating": "0 25px 50px -12px rgba(0, 0, 0, 0.1)"
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
            background: linear-gradient(180deg, #E0F2FE 0%, #FFFFFF 100%);
        }
        .floating-anim {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .puf-shape {
            border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
        }
    </style>
</head>
<body class="font-body text-on-surface overflow-hidden h-screen w-screen relative">
<!-- Background Decoration: Soft Clouds -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden opacity-40">
<div class="absolute top-[10%] left-[5%] w-64 h-32 bg-white rounded-full blur-3xl"></div>
<div class="absolute top-[25%] right-[-5%] w-80 h-40 bg-white rounded-full blur-3xl"></div>
<div class="absolute bottom-[20%] left-[15%] w-72 h-36 bg-white rounded-full blur-3xl"></div>
</div>
<!-- UI Overlay Shell (Corners) -->
<!-- Top-Left: Settings -->
<div class="fixed top-6 left-6 z-50">
<button class="w-14 h-14 bg-white/80 backdrop-blur-md rounded-2xl flex items-center justify-center shadow-soft hover:scale-105 active:scale-95 transition-all border border-white">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="settings">settings</span>
</button>
</div>
<!-- Top-Right: Help -->
<div class="fixed top-6 right-6 z-50">
<button class="w-14 h-14 bg-white/80 backdrop-blur-md rounded-2xl flex items-center justify-center shadow-soft hover:scale-105 active:scale-95 transition-all border border-white">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="help">help</span>
</button>
</div>
<!-- Bottom-Left: Profile -->
<div class="fixed bottom-6 left-6 z-50">
<button class="w-14 h-14 bg-white/80 backdrop-blur-md rounded-2xl flex items-center justify-center shadow-soft hover:scale-105 active:scale-95 transition-all border border-white">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="person">person</span>
</button>
</div>
<!-- Bottom-Right: Achievements -->
<div class="fixed bottom-6 right-6 z-50">
<button class="w-14 h-14 bg-white/80 backdrop-blur-md rounded-2xl flex items-center justify-center shadow-soft hover:scale-105 active:scale-95 transition-all border border-white">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="emoji_events">emoji_events</span>
</button>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center justify-center h-full space-y-12">
<!-- Logo Section -->
<div class="text-center">
<h1 class="font-headline font-bold text-[56px] md:text-[72px] text-primary tracking-tight leading-none drop-shadow-sm">
                DreamQuest
            </h1>
<p class="font-body font-medium text-on-surface-variant/60 uppercase tracking-[0.3em] text-sm mt-2">
                Infinite Wonders
            </p>
</div>
<!-- Character Sprite Decoration (Puf Modern Edition) -->
<div class="relative w-48 h-48 flex items-center justify-center floating-anim">
<div class="absolute inset-0 bg-primary/10 puf-shape blur-2xl"></div>
<div class="w-40 h-40 bg-gradient-to-br from-primary to-[#8e87ff] puf-shape shadow-floating relative flex items-center justify-center overflow-hidden border-4 border-white">
<!-- Puf Face -->
<div class="flex flex-col items-center gap-2">
<div class="flex gap-6">
<div class="w-3 h-3 bg-white rounded-full"></div>
<div class="w-3 h-3 bg-white rounded-full"></div>
</div>
<div class="w-8 h-1 bg-white/40 rounded-full mt-2"></div>
</div>
</div>
</div>
<!-- Center: PLAY BUTTON -->
<div class="w-full max-w-xs px-6">
<button class="w-full bg-gradient-to-r from-primary to-[#8e87ff] py-6 rounded-2xl shadow-vibrant hover:shadow-floating hover:scale-[1.02] active:scale-95 transition-all duration-300 group">
<span class="font-headline font-bold text-[32px] md:text-[40px] text-white tracking-wide uppercase flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-[48px]" data-icon="play_arrow">play_arrow</span>
                    PLAY
                </span>
</button>
</div>
<!-- Below Center: Secondary Buttons -->
<div class="flex flex-col md:flex-row gap-4 w-full max-w-sm px-10">
<!-- SHOP BUTTON -->
<button class="flex-1 bg-white py-4 rounded-xl shadow-soft hover:shadow-md hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center space-x-3 border border-outline">
<span class="material-symbols-outlined text-[24px] text-secondary" data-icon="shopping_bag">shopping_bag</span>
<span class="font-headline font-bold text-lg text-on-surface">SHOP</span>
</button>
<!-- LEADERBOARD BUTTON -->
<button class="flex-1 bg-white py-4 rounded-xl shadow-soft hover:shadow-md hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center space-x-3 border border-outline">
<span class="material-symbols-outlined text-[24px] text-tertiary" data-icon="leaderboard">leaderboard</span>
<span class="font-headline font-bold text-lg text-on-surface">RANK</span>
</button>
</div>
<!-- Version/Status Bar Footer -->
<div class="absolute bottom-10 text-center w-full">
<div class="inline-flex items-center gap-2 bg-white/50 backdrop-blur-sm px-4 py-1.5 rounded-full border border-white/50 shadow-sm">
<div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
<p class="font-body text-[11px] uppercase tracking-widest font-semibold text-on-surface-variant/70">
                    STABLE v2.4.0 • CLOUD ONLINE
                </p>
</div>
</div>
</main>
</body></html>
